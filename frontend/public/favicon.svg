<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Edge: A ↔ B -->
  <line x1="6" y1="12" x2="26" y2="12" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Edge: B → C -->
  <line x1="26" y1="12" x2="21" y2="23" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Edge: A → C -->
  <line x1="6" y1="12" x2="21" y2="23" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Node A — left (primary) -->
  <circle cx="6" cy="12" r="4" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="6" cy="12" r="1.8" fill="#22d3ee"/>

  <!-- Node B — right (primary) -->
  <circle cx="26" cy="12" r="4" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="26" cy="12" r="1.8" fill="#22d3ee"/>

  <!-- Node C — bottom (secondary) -->
  <circle cx="21" cy="23" r="3" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="21" cy="23" r="1.3" fill="#22d3ee" fill-opacity="0.7"/>
</svg>
