app = "pdbq"
primary_region = "den"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "pdbq_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "1gb"
  cpus = 1

[[processes]]
  name = "web"
  entrypoint = ["uv", "run", "uvicorn", "pdbq.api.main:app", "--host", "0.0.0.0", "--port", "8080"]

# Scheduled sync machine — runs nightly at 02:00 UTC
# Deploy with: fly machine run . --schedule="0 2 * * *" --entrypoint="uv run python sync/run.py --incremental"
