app = "pdbq"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "pdbq_data"
  destination = "/app/data"

[processes]
  app = "/app/.venv/bin/uvicorn pdbq.api.main:app --host 0.0.0.0 --port 8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "40s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "512mb"
  cpus = 1

# Scheduled sync machine — runs nightly at 02:00 UTC
# Deploy with: fly machine run . --schedule="0 2 * * *" --entrypoint="uv run python sync/run.py --incremental"
